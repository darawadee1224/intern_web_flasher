<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 Web Flasher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-content">
      <h1>ESP32 WEB FLASHER <span class="version">V1.0</span></h1>
      <div class="status-badge">CARE 69 TEAM</div>
    </div>
  </header>

  <div class="main-container">
    <div class="card">
      <h2 class="card-title">SELECT FIRMWARE</h2>
      
      <div class="file-list">
        <div class="file-row">
          <div class="file-label-group">
            <span class="icon">⚙️</span>
            <label>Bootloader</label>
          </div>
          <input type="file" id="bootloader" accept=".bin" class="file-input" />
          <div class="address-group">
            <label>Address:</label>
            <input type="text" id="bootloaderAddr" value="0x1000" class="address-input" />
          </div>
        </div>

        <div class="file-row">
          <div class="file-label-group">
            <span class="icon">🗂️</span>
            <label>Partition Table</label>
          </div>
          <input type="file" id="partitions" accept=".bin" class="file-input" />
          <div class="address-group">
            <label>Address:</label>
            <input type="text" id="partitionsAddr" value="0x8000" class="address-input" />
          </div>
        </div>

        <div class="file-row">
          <div class="file-label-group">
            <span class="icon">📄</span>
            <label>Application</label>
          </div>
          <input type="file" id="firmware" accept=".bin" class="file-input" />
          <div class="address-group">
            <label>Address:</label>
            <input type="text" id="firmwareAddr" value="0x10000" class="address-input" />
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">CONFIGURATION</h2>
      <div class="config-row">
        <div class="config-group">
          <label for="baudRate">BAUD RATE</label>
          <select id="baudRate" class="select-input">
            <option value="115200">115200</option>
            <option value="230400">230400</option>
            <option value="460800" selected>460800</option>
            <option value="921600">921600</option>
          </select>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <button id="connect" class="btn btn-primary">CONNECT PORT</button>
      <button id="disconnect" class="btn btn-danger" disabled>DISCONNECT</button>
      <button id="flash" class="btn btn-success">START FLASH</button>
    </div>

    <div class="progress-container">
      <div class="progress-header">
        <span class="progress-title">PROGRESS</span>
        <span id="progressPercent" class="progress-percent">0%</span>
      </div>
      <progress id="progressBar" value="0" max="100"></progress>
      <div id="progressStatus" class="progress-status">Ready to Flash</div>
    </div>

    <div class="console-container">
      <div class="console-header">
        <span>FLASH CONSOLE</span>
        <div class="console-actions">
          <button id="clearLog" class="btn-console">CLEAR LOG</button>
          <button id="downloadLog" class="btn-console">DOWNLOAD LOG</button>
        </div>
      </div>
      <textarea id="log" readonly placeholder="สถานะการทำงานจะแสดงที่นี่..."></textarea>
    </div>
  </div>

  <script type="module" src="flash.js"></script>
</body>
</html>
