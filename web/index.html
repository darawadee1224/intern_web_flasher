<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Web Flasher Toolkit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-content">
      <h1>ESP32 WEB TOOLKIT <span class="version">v1.1</span></h1>
      <div class="status-badge">WebSerial Ready</div>
    </div>
  </header>

  <main class="main-container">
    
    <div class="card">
      <div class="card-title">🔌 HARDWARE CONFIGURATION</div>
      <div class="config-group">
        <label for="baudRate">Baud Rate:</label>
        <select id="baudRate" class="select-input">
          <option value="115200">115200</option>
          <option value="230400">230400</option>
          <option value="460800" selected>460800</option>
          <option value="921600">921600</option>
        </select>
      </div>
    </div>

    <div class="action-buttons">
      <button id="connect" class="btn btn-primary">🔌 CONNECT PORT</button>
      <button id="disconnect" class="btn btn-danger" disabled>❌ DISCONNECT</button>
      <button id="flash" class="btn btn-success">⚡ FLASH FIRMWARE</button>
    </div>

    <div class="card">
      <div class="card-title">💾 FIRMWARE FILES (.BIN)</div>
      <div class="file-list">
        
        <div class="file-row">
          <div class="file-label-group">
            <span class="icon">📦</span> Bootloader
          </div>
          <input type="file" id="bootloader" class="file-input" accept=".bin">
          <div class="address-group">
            <label>Address:</label>
            <input type="text" id="bootloaderAddr" class="address-input" value="0x1000">
          </div>
        </div>

        <div class="file-row">
          <div class="file-label-group">
            <span class="icon">📊</span> Partitions
          </div>
          <input type="file" id="partitions" class="file-input" accept=".bin">
          <div class="address-group">
            <label>Address:</label>
            <input type="text" id="partitionsAddr" class="address-input" value="0x8000">
          </div>
        </div>

        <div class="file-row">
          <div class="file-label-group">
            <span class="icon">⚙️</span> Firmware
          </div>
          <input type="file" id="firmware" class="file-input" accept=".bin">
          <div class="address-group">
            <label>Address:</label>
            <input type="text" id="firmwareAddr" class="address-input" value="0x10000">
          </div>
        </div>

      </div>
    </div>

    <div class="progress-container">
      <div class="progress-header">
        <span>FLASHING STATUS</span>
        <span id="progressPercent" class="progress-percent">0%</span>
      </div>
      <progress id="progressBar" value="0" max="100"></progress>
      <div id="progressStatus" class="progress-status">Ready to Connect</div>
    </div>

    <div class="console-container">
      <div class="console-header">
        <span>💻 SYSTEM LOG CONSOLE</span>
        <div class="console-actions">
          <button id="downloadLog" class="btn-console">📥 DOWNLOAD LOG</button>
          <button id="clearLog" class="btn-console">🧹 CLEAR</button>
        </div>
      </div>
      <textarea id="log" readonly placeholder="ระบบกำลังเตรียมพร้อม... รอการเชื่อมต่ออุปกรณ์ Hardware"></textarea>
    </div>

  </main>

  <script type="module" src="flash.js"></script>
</body>
</html>
